<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Logging 教学面板</title>
    <!-- 引入 Tailwind CSS 以快速构建极简美观的 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-container {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-gray-800 border-b border-gray-700 p-5 shadow-lg flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-3">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                后端日志教学大屏
            </h1>
            <p class="text-gray-400 text-sm mt-1 ml-10">通过 Docker 挂载调试，直观感受企业级组件的输出</p>
        </div>
        <div class="text-xs text-gray-500 bg-gray-900 px-3 py-1 rounded-full border border-gray-700">
            v1.0.0
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-6 gap-6 max-h-[calc(100vh-80px)]">
        <!-- 左侧控制面板 -->
        <aside class="w-full md:w-1/3 flex flex-col gap-5 overflow-y-auto pr-2 custom-scrollbar">
            <!-- 操作触发器区 -->
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                <h2 class="text-xl font-bold mb-5 border-b border-gray-700 pb-3 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    模拟业务动作
                </h2>
                
                <div class="flex flex-col gap-4">
                    <button onclick="triggerAction('/api/trigger_basic')" class="group bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-lg text-left transition-all shadow hover:shadow-lg flex items-center justify-between">
                        <div>
                            <span class="block font-medium">1. 触发基础日志文件</span>
                            <span class="text-xs text-blue-200 opacity-80 mt-1 block">运行 foundation/01_basic_logging.py</span>
                        </div>
                        <svg class="w-5 h-5 opacity-50 group-hover:opacity-100 transition-opacity translate-x-0 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    
                    <button onclick="triggerAction('/api/trigger_error')" class="group bg-orange-600 hover:bg-orange-500 text-white px-5 py-3 rounded-lg text-left transition-all shadow hover:shadow-lg flex items-center justify-between">
                        <div>
                            <span class="block font-medium">2. 触发错误异常日志</span>
                            <span class="text-xs text-orange-200 opacity-80 mt-1 block">运行 foundation/03_error_handling.py</span>
                        </div>
                        <svg class="w-5 h-5 opacity-50 group-hover:opacity-100 transition-opacity translate-x-0 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </button>

                    <button onclick="clearLogs()" class="group bg-slate-700 hover:bg-red-600 border border-slate-600 hover:border-red-500 text-white px-5 py-3 rounded-lg text-left transition-all mt-4 flex items-center justify-between">
                        <span class="font-medium">清空当前存在的包体日志</span>
                        <svg class="w-5 h-5 opacity-50 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
                
                <div id="status-message" class="mt-4 text-sm text-green-400 hidden p-3 bg-gray-900 rounded border border-gray-700"></div>
            </div>
            
            <!-- 附加学习科普组件 -->
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-xl flex-1 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>
                <h2 class="text-xl font-bold mb-3 flex items-center gap-2">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    原理解析
                </h2>
                <div class="text-gray-400 text-sm leading-relaxed space-y-3">
                    <p>
                        在真实企业级架构中，日志是追踪请求、链路监测、以及线上事故排查的**生命线**。
                    </p>
                    <p>
                        当你点击上方按钮时，<code>FastAPI</code> 服务端接收到请求并在后台非阻塞执行教学子目录中的 Python 代码，将日志追加写入 <code>app.log</code>。
                    </p>
                    <p>
                        右方大屏通过 <strong class="text-white">每 2 秒一次的轮询轮询请求 (AJAX)</strong> 直接读取该文件内容，模拟了生产环境中 ELK 或 Loki 的尾部实时嗅探机制。
                    </p>
                </div>
            </div>
        </aside>

        <!-- 右侧日志监控大屏 -->
        <main class="w-full md:w-2/3 flex flex-col bg-[#0d1117] rounded-xl border border-gray-700 shadow-2xl overflow-hidden relative">
            <!-- 终端顶部仿 Mac 操作条 -->
            <div class="bg-gray-800 px-4 py-3 border-b border-gray-700 flex justify-between items-center select-none">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="ml-3 text-xs text-slate-400 font-mono tracking-widest font-bold">TAIL /APP.LOG</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-xs text-green-400 font-semibold tracking-wide">ACTIVE</span>
                </div>
            </div>
            <!-- 日志主体区 -->
            <div class="p-5 flex-1 overflow-auto relative scroll-smooth" id="log-scroll-area">
                <div id="log-output" class="log-container text-[13px] text-gray-300">
                    <span class="text-gray-500">等待初始化加载...</span>
                </div>
            </div>
        </main>
    </main>

    <script>
        const statusBox = document.getElementById('status-message');
        const logOutput = document.getElementById('log-output');
        const scrollArea = document.getElementById('log-scroll-area');
        
        // 记录上一次的日志长度，如果不变就不做 DOM 刷新以免破坏滚动体验
        let lastLogLength = 0;

        function showStatus(msg, isError=false) {
            statusBox.style.display = 'block';
            statusBox.textContent = msg;
            statusBox.className = `mt-4 text-sm p-3 rounded border ${isError ? 'text-red-400 border-red-800 bg-red-900/30' : 'text-green-400 border-green-800 bg-green-900/30'} flex items-center justify-between shadow-inner`;
            setTimeout(() => { statusBox.style.display = 'none'; }, 2000);
        }

        async function triggerAction(endpoint) {
            try {
                const res = await fetch(endpoint, { method: 'POST' });
                const data = await res.json();
                if(data.status === 'success') {
                    showStatus("✅ " + data.message);
                    fetchLogs(true); // 按钮按下后强制立即刷新
                } else {
                    showStatus("❌ " + data.message, true);
                }
            } catch (err) {
                showStatus("❌ 网络请求失败，请检查 Docker 或服务端状态", true);
            }
        }

        async function clearLogs() {
            if (confirm('确定要清空现在的日志文件吗？')) {
                lastLogLength = 0; // 重置标识
                await triggerAction('/api/clear_logs');
            }
        }

        async function fetchLogs(forceScroll = false) {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                
                // 如果日志内容没变化而且不是刚触发过按钮，就不刷新 DOM 减少闪烁
                if (data.logs.length === lastLogLength && !forceScroll) {
                    return;
                }
                lastLogLength = data.logs.length;

                // 词法高亮正则替换（增加渲染的高级感）
                let formattedLogs = data.logs
                    // 替换安全词汇
                    .replace(/ERROR/g, '<span class="text-red-500 font-bold bg-red-900/40 px-1 rounded">ERROR</span>')
                    .replace(/WARNING/g, '<span class="text-yellow-500 font-bold bg-yellow-900/40 px-1 rounded">WARNING</span>')
                    .replace(/INFO/g, '<span class="text-blue-400 font-bold">INFO</span>')
                    .replace(/DEBUG/g, '<span class="text-gray-500">DEBUG</span>')
                    .replace(/CRITICAL/g, '<span class="bg-red-600 text-white px-2 py-0.5 text-xs font-bold rounded animate-pulse shadow-red-500">CRITICAL</span>')
                    // 高亮显示日期和时间
                    .replace(/(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})/g, '<span class="text-cyan-600/80">$1</span>')
                    // 高亮行号或者模块名等常见日志标识
                    .replace(/(\[.*?\])/g, '<span class="text-purple-400/80">$1</span>');
                
                if (!data.logs || data.logs.trim() === "") {
                    logOutput.innerHTML = '<span class="text-gray-600 italic">📂 目前无记录存在于 app.log 中，请尝试在左侧触发模拟动作生成。</span>';
                } else {
                    logOutput.innerHTML = formattedLogs;
                }
                
                // 判断滚动条是否本来就在最底下，或者由按钮通过 forceScroll 强制触发
                // 以实现"有新日志自动滚屏"的效果
                const isScrolledToBottom = scrollArea.scrollHeight - scrollArea.clientHeight <= scrollArea.scrollTop + 50;
                if (isScrolledToBottom || forceScroll) {
                    scrollArea.scrollTop = scrollArea.scrollHeight;
                }
            } catch (err) {
                logOutput.innerHTML = '<span class="text-red-500">❌ 无法连接到服务器拉取日志。请确认 Docker 服务端运转正常。</span>';
            }
        }

        // 初始化第一次获取并启动长轮询
        fetchLogs(true);
        setInterval(() => fetchLogs(false), 2000);
    </script>
</body>
</html>
